name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - run: dotnet test --no-build -c Release --verbosity minimal

      - name: Pack
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          for proj in src/*/OtelEvents.*.csproj; do
            dotnet pack "$proj" -c Release -o ./nupkgs /p:Version=$VERSION --no-build
          done
          dotnet pack tools/OtelEvents.Cli/OtelEvents.Cli.csproj -c Release -o ./nupkgs /p:Version=$VERSION --no-build

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: true
          files: ./nupkgs/*.nupkg
