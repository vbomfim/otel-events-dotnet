# ─── Built-in Lifecycle Events Schema ────────────────────────────────────────
# Application lifecycle and health events for OpenTelemetry-based observability.
# Part of the ALL (Another Logging Library) built-in schemas.
# See: SPECIFICATION.md §3 Feature 2.4

schema:
  name: Lifecycle
  version: "1.0.0"
  namespace: All.Events.Lifecycle
  description: "Built-in schema for application lifecycle and health events"
  meterName: otel_events.lifecycle

enums:
  HealthStatus:
    description: "Application health state"
    values:
      - Healthy
      - Degraded
      - Unhealthy

  LifecyclePhase:
    description: "Application lifecycle phase"
    values:
      - Starting
      - Started
      - Stopping
      - Stopped

events:
  app.lifecycle.changed:
    id: 9001
    severity: INFO
    description: "Application lifecycle phase transition"
    message: "Application lifecycle changed to {phase}"
    fields:
      phase:
        type: enum
        ref: LifecyclePhase
        required: true
      reason:
        type: string
    metrics:
      app.lifecycle.transitions:
        type: counter

  app.health.changed:
    id: 9002
    severity: WARN
    description: "Application health status changed"
    message: "Application health changed from {previousStatus} to {currentStatus}: {reason}"
    fields:
      previousStatus:
        type: enum
        ref: HealthStatus
        required: true
      currentStatus:
        type: enum
        ref: HealthStatus
        required: true
      reason:
        type: string
        required: true
    metrics:
      app.health.changes:
        type: counter
        labels:
          - currentStatus

  app.startup.completed:
    id: 9003
    severity: INFO
    description: "Application startup completed successfully"
    message: "Application startup completed in {durationMs}ms"
    fields:
      durationMs:
        type: long
        required: true
    metrics:
      app.startup.durationMs:
        type: histogram

  app.shutdown.initiated:
    id: 9004
    severity: INFO
    description: "Application shutdown has been initiated"
    message: "Application shutdown initiated: {reason}"
    fields:
      reason:
        type: string
        required: true
