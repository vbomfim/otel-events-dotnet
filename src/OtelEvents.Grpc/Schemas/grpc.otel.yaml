# ─── OtelEvents.Grpc — Bundled Schema ────────────────────────────────────
# This schema is embedded in the NuGet package for documentation and
# tooling inspection. The C# code is pre-compiled — consumers do NOT
# need All.Schema to use this pack.

schema:
  name: "OtelEvents.Grpc"
  version: "1.0.0"
  namespace: "OtelEvents.Grpc.Events"
  meterName: "OtelEvents.Grpc"
  description: "Schema-defined gRPC call lifecycle events for server and client interceptors"

fields:
  grpcService:
    type: string
    description: "Fully qualified gRPC service name (e.g., greet.Greeter)"
    index: true

  grpcMethod:
    type: string
    description: "gRPC method name (e.g., SayHello)"
    index: true

  grpcStatusCode:
    type: int
    description: "gRPC status code (0=OK, 1=Cancelled, 2=Unknown, ...)"
    index: true

  grpcStatusDetail:
    type: string
    description: "gRPC status detail message"

  durationMs:
    type: double
    description: "Call duration in milliseconds"
    unit: "ms"

  requestSize:
    type: long
    description: "Request message size in bytes"
    unit: "bytes"

  responseSize:
    type: long
    description: "Response message size in bytes"
    unit: "bytes"

  grpcSide:
    type: enum
    description: "Whether event originates from server or client"
    values: [Server, Client]

  errorType:
    type: string
    description: "Exception type name for failed calls"
    index: true

enums:
  GrpcSide:
    description: "Side of gRPC communication"
    values:
      - Server
      - Client

events:
  grpc.call.started:
    id: 10101
    severity: INFO
    description: "A gRPC call started processing (server-side) or was initiated (client-side)."
    message: "gRPC {grpcSide} {grpcService}/{grpcMethod} started"
    fields:
      grpcService:
        ref: grpcService
        required: true
      grpcMethod:
        ref: grpcMethod
        required: true
      grpcSide:
        ref: grpcSide
        required: true
      requestSize:
        ref: requestSize
        required: false
    metrics:
      otel.grpc.call.started.count:
        type: counter
        unit: "calls"
        description: "Total gRPC calls started"
        labels:
          - grpcService
          - grpcMethod
          - grpcSide
    tags:
      - grpc

  grpc.call.completed:
    id: 10102
    severity: INFO
    description: "A gRPC call completed successfully."
    message: "gRPC {grpcSide} {grpcService}/{grpcMethod} completed with status {grpcStatusCode} in {durationMs}ms"
    fields:
      grpcService:
        ref: grpcService
        required: true
      grpcMethod:
        ref: grpcMethod
        required: true
      grpcSide:
        ref: grpcSide
        required: true
      grpcStatusCode:
        ref: grpcStatusCode
        required: true
      grpcStatusDetail:
        ref: grpcStatusDetail
        required: false
      durationMs:
        ref: durationMs
        required: true
      requestSize:
        ref: requestSize
        required: false
      responseSize:
        ref: responseSize
        required: false
    metrics:
      otel.grpc.call.duration:
        type: histogram
        unit: "ms"
        description: "gRPC call duration"
        buckets: [1, 5, 10, 25, 50, 100, 250, 500, 1000, 2500, 5000]
      otel.grpc.call.completed.count:
        type: counter
        unit: "calls"
        description: "Total gRPC calls completed by status"
        labels:
          - grpcService
          - grpcMethod
          - grpcSide
          - grpcStatusCode
    tags:
      - grpc

  grpc.call.failed:
    id: 10103
    severity: ERROR
    description: "A gRPC call failed with an exception or non-OK status."
    message: "gRPC {grpcSide} {grpcService}/{grpcMethod} failed with {errorType} after {durationMs}ms"
    exception: true
    fields:
      grpcService:
        ref: grpcService
        required: true
      grpcMethod:
        ref: grpcMethod
        required: true
      grpcSide:
        ref: grpcSide
        required: true
      grpcStatusCode:
        ref: grpcStatusCode
        required: true
      grpcStatusDetail:
        ref: grpcStatusDetail
        required: false
      durationMs:
        ref: durationMs
        required: true
      errorType:
        ref: errorType
        required: true
    metrics:
      otel.grpc.call.error.count:
        type: counter
        unit: "errors"
        description: "Total gRPC call errors"
        labels:
          - grpcService
          - grpcMethod
          - grpcSide
          - grpcStatusCode
    tags:
      - grpc
      - error

  # ─── Infrastructure Events (10104–10106) ─────────────────────────────
  # Supplemental events that fire alongside grpc.call.failed (10103).
  # Controlled by OtelEventsGrpcOptions.EmitInfrastructureEvents (default: true).

  grpc.connection.failed:
    id: 10104
    severity: ERROR
    description: "A gRPC call failed due to a connection issue (StatusCode.Unavailable)."
    message: "gRPC {grpcSide} connection to {grpcService}/{grpcMethod} failed: {failureReason}"
    exception: true
    fields:
      grpcService:
        ref: grpcService
        required: true
      grpcMethod:
        ref: grpcMethod
        required: true
      grpcSide:
        ref: grpcSide
        required: true
      endpoint:
        type: string
        description: "The endpoint involved in the failure (host for client, peer for server)"
        required: false
      durationMs:
        ref: durationMs
        required: true
      errorType:
        ref: errorType
        required: true
      errorMessage:
        type: string
        description: "Exception message"
        required: false
      failureReason:
        type: string
        description: "gRPC status detail explaining the connection failure"
        required: false
    metrics:
      otel.grpc.connection.failed.count:
        type: counter
        unit: "errors"
        description: "gRPC connection failures"
        labels:
          - grpcService
          - grpcMethod
          - grpcSide
    tags:
      - grpc
      - infrastructure
      - connection

  grpc.auth.failed:
    id: 10105
    severity: ERROR
    description: "A gRPC call failed due to authentication or authorization (Unauthenticated/PermissionDenied)."
    message: "gRPC {grpcSide} auth failed for {grpcService}/{grpcMethod} with HTTP {httpStatusCode}"
    exception: true
    fields:
      grpcService:
        ref: grpcService
        required: true
      grpcMethod:
        ref: grpcMethod
        required: true
      grpcSide:
        ref: grpcSide
        required: true
      httpStatusCode:
        type: int
        description: "Mapped HTTP status code (401 for Unauthenticated, 403 for PermissionDenied)"
        index: true
      authScheme:
        type: string
        description: "Authentication scheme (e.g., Bearer, Basic) extracted from Authorization header"
        required: false
      identityHint:
        type: string
        description: "Truncated SHA-256 hash of the credential — never the raw value"
        required: false
    metrics:
      otel.grpc.auth.failed.count:
        type: counter
        unit: "errors"
        description: "gRPC authentication failures"
        labels:
          - grpcService
          - grpcMethod
          - grpcSide
          - httpStatusCode
    tags:
      - grpc
      - infrastructure
      - security

  grpc.throttled:
    id: 10106
    severity: WARN
    description: "A gRPC call was throttled (StatusCode.ResourceExhausted)."
    message: "gRPC {grpcSide} {grpcService}/{grpcMethod} throttled"
    exception: true
    fields:
      grpcService:
        ref: grpcService
        required: true
      grpcMethod:
        ref: grpcMethod
        required: true
      grpcSide:
        ref: grpcSide
        required: true
      retryAfterMs:
        type: long
        description: "Retry delay in ms from trailing metadata (retry-after-ms key)"
        unit: "ms"
        required: false
    metrics:
      otel.grpc.throttled.count:
        type: counter
        unit: "errors"
        description: "gRPC throttled requests"
        labels:
          - grpcService
          - grpcMethod
          - grpcSide
    tags:
      - grpc
      - infrastructure
      - throttle
