# NetworkPolicy for otel-events-based .NET services.
#
# Restricts egress to:
#   - OTEL Collector (port 4317/TCP) in the monitoring namespace
#   - DNS (port 53/UDP+TCP) for service discovery
#
# Customize: Replace "my-service" with your service name.
# Add additional egress rules for databases, APIs, etc.
#
# See: SPECIFICATION.md §17.6
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: my-service-netpol
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: my-service
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - protocol: TCP
          port: 4317
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  ingress:
    # Allow traffic from ingress controller only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - protocol: TCP
          port: 8080
