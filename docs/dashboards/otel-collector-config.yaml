# OTEL Collector configuration for OtelEvents
# Works with all OtelEvents envelope schemas (AspNetCore, Lifecycle, custom)
#
# Receives OTLP telemetry (gRPC + HTTP), batches it, and exports:
#   - Metrics → Prometheus (scraped by Grafana)
#   - Logs    → stdout (replace with Loki/Elasticsearch for production)
#   - Traces  → stdout (replace with Jaeger/Zipkin for production)
#
# Usage:
#   otelcol --config=otel-collector-config.yaml

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: ""
    send_timestamps: true
    metric_expiration: 5m
    resource_to_telemetry_conversion:
      enabled: true

  logging:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info

  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging]
