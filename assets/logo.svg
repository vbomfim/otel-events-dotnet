<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="50%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="480" height="120" rx="16" fill="url(#bg)"/>
  <!-- Accent bar -->
  <rect x="0" y="112" width="480" height="8" rx="0" fill="url(#accent)"/>
  <!-- Signal icon: 3 connected nodes (event graph) -->
  <circle cx="40" cy="45" r="8" fill="#e94560" opacity="0.9"/>
  <circle cx="65" cy="65" r="6" fill="#533483" opacity="0.9"/>
  <circle cx="55" cy="30" r="5" fill="#0f3460" opacity="0.9"/>
  <line x1="40" y1="45" x2="65" y2="65" stroke="#e94560" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="45" x2="55" y2="30" stroke="#533483" stroke-width="2" opacity="0.5"/>
  <line x1="55" y1="30" x2="65" y2="65" stroke="#0f3460" stroke-width="1.5" opacity="0.3"/>
  <!-- Title -->
  <text x="90" y="55" font-family="Segoe UI, system-ui, sans-serif" font-size="36" font-weight="700" fill="#ffffff">
    otel-events
  </text>
  <!-- Subtitle -->
  <text x="90" y="82" font-family="Segoe UI, system-ui, sans-serif" font-size="14" fill="#a0a0b0">
    Schema-driven event logging for OpenTelemetry .NET
  </text>
  <!-- .NET badge -->
  <rect x="395" y="35" width="60" height="24" rx="12" fill="#512bd4" opacity="0.9"/>
  <text x="425" y="52" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">.NET</text>
</svg>
