# ─── Sample Order Events Schema ──────────────────────────────────────────────
# Demonstrates typed transactions for an order lifecycle workflow.
# All fields are strings. Shorthand list syntax.

schema:
  name: "Sample.Orders"
  version: "2.0.0"
  namespace: "OtelEvents.Sample.WebApi.Events"
  meterName: "Sample.Events.Orders"

events:
  order.placed:
    id: 20001
    type: start
    severity: INFO
    message: "Order {orderId} placed by customer {customerId} for ${amount}"
    fields:
      - orderId: { required: true }
      - customerId: { required: true, sensitivity: pii }
      - amount: { required: true }
    metrics:
      sample.order.placed.count:
        type: counter
        labels: [customerId]
      sample.order.placed.amount:
        type: histogram
        field: amount

  order.completed:
    id: 20002
    type: success
    parent: order.placed
    severity: INFO
    message: "Order {orderId} shipped via {carrier}"
    fields:
      - orderId: { required: true }
      - carrier: { required: true }
      - trackingNumber

  order.failed:
    id: 20003
    type: failure
    parent: order.placed
    severity: ERROR
    message: "Order {orderId} failed: {reason}"
    exception: true
    fields:
      - orderId: { required: true }
      - reason: { required: true }
    metrics:
      sample.order.failed.count:
        type: counter

  order.note.added:
    id: 20004
    severity: INFO
    message: "Note added to order {orderId}: {note}"
    fields:
      - orderId: { required: true }
      - note: { required: true }
