# ─── Sample Order Events Schema ──────────────────────────────────────────────
# All fields are strings and required by default.
# Use { optional: true } to mark a field as optional.

schema:
  name: "Sample.Orders"
  version: "2.0.0"
  namespace: "OtelEvents.Sample.WebApi.Events"
  meterName: "Sample.Events.Orders"

events:
  order.placed:
    id: 20001
    type: start
    severity: INFO
    message: "Order {orderId} placed by customer {customerId} for ${amount}"
    fields:
      - orderId
      - customerId: { sensitivity: pii }
      - amount
    metrics:
      sample.order.placed.count:
        type: counter
        labels: [customerId]
      sample.order.placed.amount:
        type: histogram
        field: amount

  order.completed:
    id: 20002
    type: success
    parent: order.placed
    severity: INFO
    message: "Order {orderId} shipped via {carrier}"
    fields:
      - orderId
      - carrier
      - trackingNumber: { optional: true }

  order.failed:
    id: 20003
    type: failure
    parent: order.placed
    severity: ERROR
    message: "Order {orderId} failed: {reason}"
    exception: true
    fields:
      - orderId
      - reason
    metrics:
      sample.order.failed.count:
        type: counter

  order.note.added:
    id: 20004
    severity: INFO
    message: "Note added to order {orderId}: {note}"
    fields:
      - orderId
      - note
